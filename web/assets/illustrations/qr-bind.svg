<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none">
  <!-- Printer screen showing QR -->
  <rect x="60" y="60" width="180" height="200" rx="10" fill="#0f0f20" stroke="#4f9eff" stroke-width="2"/>
  <rect x="70" y="70" width="160" height="180" rx="6" fill="#111118"/>
  <text x="150" y="95" text-anchor="middle" font-size="11" fill="#4f9eff" font-family="sans-serif">Bind Printer</text>

  <!-- QR code placeholder (simplified) -->
  <rect x="90" y="105" width="120" height="120" rx="4" fill="white"/>
  <rect x="94" y="109" width="30" height="30" fill="#111118"/>
  <rect x="186" y="109" width="30" height="30" fill="#111118"/>
  <rect x="94" y="191" width="30" height="30" fill="#111118"/>
  <!-- Center pattern -->
  <rect x="130" y="120" width="60" height="8" fill="#111118"/>
  <rect x="130" y="132" width="20" height="20" fill="#111118"/>
  <rect x="170" y="132" width="20" height="20" fill="#111118"/>
  <rect x="130" y="156" width="60" height="8" fill="#111118"/>
  <rect x="148" y="168" width="24" height="20" fill="#111118"/>
  <rect x="100" y="145" width="8" height="30" fill="#111118"/>
  <rect x="192" y="145" width="8" height="30" fill="#111118"/>

  <!-- Phone scanning -->
  <rect x="280" y="80" width="120" height="200" rx="14" fill="#1a1a2e" stroke="#4f9eff" stroke-width="2"/>
  <rect x="286" y="90" width="108" height="180" rx="8" fill="#0f0f20"/>
  <!-- Camera viewfinder -->
  <rect x="296" y="120" width="88" height="88" rx="4" fill="#111118" stroke="#4f9eff" stroke-width="1.5"/>
  <!-- Corner guides -->
  <path d="M300 124 h10 M300 124 v10" stroke="#4f9eff" stroke-width="2" stroke-linecap="round"/>
  <path d="M380 124 h-10 M380 124 v10" stroke="#4f9eff" stroke-width="2" stroke-linecap="round"/>
  <path d="M300 204 h10 M300 204 v-10" stroke="#4f9eff" stroke-width="2" stroke-linecap="round"/>
  <path d="M380 204 h-10 M380 204 v-10" stroke="#4f9eff" stroke-width="2" stroke-linecap="round"/>
  <!-- Scan line animation suggestion -->
  <line x1="296" y1="164" x2="384" y2="164" stroke="#4f9eff" stroke-width="1.5" opacity="0.7"/>
  <text x="340" y="226" text-anchor="middle" font-size="10" fill="#4f9eff" font-family="sans-serif">Bambu Handy</text>

  <!-- Arrow between them -->
  <line x1="244" y1="165" x2="276" y2="165" stroke="#3ecf8e" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="274,161 282,165 274,169" fill="#3ecf8e"/>

  <text x="240" y="295" text-anchor="middle" font-size="13" fill="#888899" font-family="sans-serif">Point phone camera at the QR on the printer screen</text>
</svg>
