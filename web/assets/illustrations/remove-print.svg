<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none">
  <!-- Build plate being flexed -->
  <path d="M 80 200 Q 240 180 400 200" stroke="#2e2e38" stroke-width="3" fill="none"/>
  <!-- Plate flex lines -->
  <path d="M 100 195 Q 240 170 380 195" stroke="#4f9eff" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Printed object on plate -->
  <rect x="180" y="150" width="120" height="50" rx="6" fill="#4f9eff" opacity="0.8"/>
  <text x="240" y="181" text-anchor="middle" font-size="13" fill="white" font-family="sans-serif">Your print!</text>

  <!-- Hands flexing -->
  <ellipse cx="108" cy="210" rx="22" ry="14" fill="#c4956a" opacity="0.8"/>
  <ellipse cx="372" cy="210" rx="22" ry="14" fill="#c4956a" opacity="0.8"/>

  <!-- Flex arrows -->
  <path d="M 108 196 Q 108 180 120 175" stroke="#3ecf8e" stroke-width="2" stroke-linecap="round" fill="none"/>
  <polygon points="118,170 124,178 128,172" fill="#3ecf8e"/>
  <path d="M 372 196 Q 372 180 360 175" stroke="#3ecf8e" stroke-width="2" stroke-linecap="round" fill="none"/>
  <polygon points="362,170 356,178 352,172" fill="#3ecf8e"/>

  <!-- Cool down timer -->
  <circle cx="240" cy="80" r="36" fill="#1a1a2e" stroke="#f59e0b" stroke-width="2"/>
  <text x="240" y="74" text-anchor="middle" font-size="24" fill="#f59e0b" font-family="sans-serif">⏱</text>
  <text x="240" y="96" text-anchor="middle" font-size="11" fill="#f59e0b" font-family="sans-serif">~5 min</text>
  <text x="240" y="108" text-anchor="middle" font-size="10" fill="#888899" font-family="sans-serif">cool down</text>

  <text x="240" y="295" text-anchor="middle" font-size="13" fill="#888899" font-family="sans-serif">Wait 5 min · flex plate · print pops off</text>
</svg>
