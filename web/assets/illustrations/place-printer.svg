<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none">
  <!-- Table -->
  <rect x="40" y="220" width="400" height="16" rx="4" fill="#2e2e38"/>
  <rect x="60" y="236" width="12" height="64" rx="4" fill="#222228"/>
  <rect x="408" y="236" width="12" height="64" rx="4" fill="#222228"/>

  <!-- Printer body -->
  <rect x="140" y="120" width="200" height="100" rx="8" fill="#1a1a2e" stroke="#4f9eff" stroke-width="2"/>
  <!-- Screen -->
  <rect x="160" y="140" width="60" height="40" rx="4" fill="#4f9eff" opacity="0.4"/>
  <rect x="163" y="143" width="54" height="34" rx="3" fill="#0f0f20"/>
  <text x="190" y="165" text-anchor="middle" font-size="10" fill="#4f9eff" font-family="monospace">A1</text>
  <!-- Print head rail -->
  <rect x="145" y="115" width="190" height="8" rx="3" fill="#4f9eff" opacity="0.6"/>
  <!-- Print head -->
  <rect x="220" y="108" width="24" height="24" rx="4" fill="#4f9eff"/>
  <!-- Build plate -->
  <rect x="148" y="218" width="184" height="6" rx="2" fill="#555"/>

  <!-- Clearance arrows -->
  <!-- Left -->
  <line x1="120" y1="170" x2="140" y2="170" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="75" y="174" font-size="11" fill="#f59e0b" font-family="sans-serif">10cm</text>
  <!-- Right -->
  <line x1="340" y1="170" x2="360" y2="170" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="363" y="174" font-size="11" fill="#f59e0b" font-family="sans-serif">10cm</text>
  <!-- Top -->
  <line x1="240" y1="80" x2="240" y2="115" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="246" y="100" font-size="11" fill="#f59e0b" font-family="sans-serif">10cm</text>

  <!-- Label -->
  <text x="240" y="290" text-anchor="middle" font-size="13" fill="#888899" font-family="sans-serif">Stable, flat surface · 10 cm clearance on all sides</text>
</svg>
